<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarm Vision &bull; Sécurité IA résidentielle &amp; entreprise</title>
  <meta name="description" content="Alarm Vision – Détection intelligente, zéro fausse alerte. Vidéosurveillance IA pour particuliers et professionnels. Agence à Lyon.">

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts : Inter + Syne -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>window.addEventListener('load',function(){emailjs.init('MFZW0V06es17giiT8');});</script>

  <style>
    body { background:#fff; color:#0B0B0B; font-family:'Inter',sans-serif; margin:0; }
    @media(max-width:639px){ main { padding-bottom:64px; } }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
    @keyframes typing { 0%,100%{opacity:.3} 50%{opacity:1} }
    .typing span { display:inline-block; width:6px; height:6px; border-radius:50%; background:#9ca3af; margin:0 1px; animation:typing 1s ease-in-out infinite; }
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    .leaflet-container { height:100%; width:100%; border-radius:1rem; z-index:1; }
  </style>
</head>
<body class="antialiased">
  <div id="root"></div>
  <script src="assets/app.js"></script>
</body>
</html>
